name: Publish to PyPI

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build auditwheel

      - name: Install patchelf
        run: sudo apt-get update && sudo apt-get install -y patchelf

      - name: Build package
        run: python -m build

      - name: Repair Linux wheel for PyPI
        run: |
          if compgen -G "dist/*-linux_x86_64.whl" > /dev/null; then
            auditwheel repair dist/*-linux_x86_64.whl -w dist/
            rm -f dist/*-linux_x86_64.whl
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
